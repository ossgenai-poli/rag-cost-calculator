name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        # Hosted under the project subpath https://USER.github.io/rag-cost-calculator/,
        # so basePath/assetPrefix MUST be set or /_next assets 404 and the app hangs
        # on "Loading prices…" (#24). NEXT_PUBLIC_BASE_PATH drives next.config.mjs.
        env:
          NEXT_PUBLIC_BASE_PATH: /rag-cost-calculator
        run: npm run build:static

      - name: Verify subpath asset base path (#24 guard)
        env:
          NEXT_PUBLIC_BASE_PATH: /rag-cost-calculator
        run: npm run verify:basepath

      - name: Disable Jekyll processing
        run: echo > out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
